site_name: Try Pages

site_dir: site
docs_dir: docs/en

theme:
  name: material

  language: en

  palette:
    # Light mode
    - scheme: default
      primary: white
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.footer

  logo:    img/black_square.svg
  favicon: img/black_square.svg

plugins:
  - search

markdown_extensions:
  - pymdownx.tilde
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      url_download: true
  - pymdownx.superfences

nav:
  - Welcome to Try Pages: index.md
  - Strange:
    - strange.md
  - Tutorial:
    - tutorial.md
  - Examples:
    - examples.md

